<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" role="img" aria-label="Zeta Beta Xi crest placeholder">
  <!-- PLACEHOLDER CREST — swap with the chapter's official crest image.
       Blue & gold shield with ΖΒΞ monogram and Est. 1993 banner. -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8C766"/>
      <stop offset="1" stop-color="#B78A34"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12305F"/>
      <stop offset="1" stop-color="#0A1F44"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M120 12 L212 44 V150 C212 214 170 262 120 288 C70 262 28 214 28 150 V44 Z"
        fill="url(#navy)" stroke="url(#gold)" stroke-width="6"/>
  <path d="M120 30 L196 56 V150 C196 205 161 247 120 270 C79 247 44 205 44 150 V56 Z"
        fill="none" stroke="#C8A24B" stroke-width="1.5" opacity="0.6"/>
  <!-- Chevron -->
  <path d="M44 150 L120 118 L196 150 L196 168 L120 136 L44 168 Z" fill="url(#gold)"/>
  <!-- Greek letters -->
  <text x="120" y="104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="46" font-weight="700" fill="#E8C766" letter-spacing="2">ΖΒΞ</text>
  <!-- Stars -->
  <g fill="#E8C766">
    <path d="M78 196 l4 9 10 1 -7 7 2 10 -9-5 -9 5 2-10 -7-7 10-1z"/>
    <path d="M162 196 l4 9 10 1 -7 7 2 10 -9-5 -9 5 2-10 -7-7 10-1z"/>
    <path d="M120 210 l5 11 12 1 -9 8 3 12 -11-6 -11 6 3-12 -9-8 12-1z"/>
  </g>
  <!-- Banner -->
  <g>
    <path d="M40 246 H200 L188 266 H52 Z" fill="url(#gold)" stroke="#8A6A28" stroke-width="1.5"/>
    <text x="120" y="261" text-anchor="middle" font-family="Georgia, serif"
          font-size="15" font-weight="700" fill="#0A1F44" letter-spacing="3">EST. 1993</text>
  </g>
</svg>
