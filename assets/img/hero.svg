<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="">
  <!-- Clean placeholder hero background — subtle navy texture, NO text.
       Replace with a real wide chapter photo when available (see README). -->
  <defs>
    <linearGradient id="h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1F44"/>
      <stop offset="0.5" stop-color="#12305F"/>
      <stop offset="1" stop-color="#081936"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#1B3E74" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0A1F44" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="52" height="52" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#C8A24B" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#h)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>
</svg>
